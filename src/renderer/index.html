    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #090d12;
      }

      .omc-boot-splash {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(115deg, rgba(83, 111, 174, 0.14) 0%, transparent 34%),
          linear-gradient(180deg, #090d12 0%, #111820 48%, #0c1117 100%);
        color: #f8fbff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .omc-boot-splash__panel {
        width: min(360px, calc(100vw - 48px));
        display: grid;
        justify-items: center;
        gap: 16px;
        text-align: center;
      }

      .omc-boot-splash__mark {
        width: 54px;
        height: 54px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: #f8fbff;
        color: #090d12;
        font-weight: 900;
        letter-spacing: 0;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
      }

      .omc-boot-splash__title {
        margin: 0;
        font-size: 18px;
        font-weight: 760;
        letter-spacing: 0;
      }

      .omc-boot-splash__bar {
        width: 180px;
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(248, 251, 255, 0.16);
      }

      .omc-boot-splash__bar::before {
        content: "";
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: #48cd91;
        animation: omcBootSplash 1.1s ease-in-out infinite;
      }

      @keyframes omcBootSplash {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(250%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="omc-boot-splash" role="status" aria-live="polite" aria-label="Open Mission Control yukleniyor">
        <div class="omc-boot-splash__panel">
          <div class="omc-boot-splash__mark">OMC</div>
          <p class="omc-boot-splash__title">Open Mission Control yukleniyor</p>
          <div class="omc-boot-splash__bar" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
